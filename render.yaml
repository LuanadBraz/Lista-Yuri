services:
  - type: web
    name: lista-yuri-api-luana-yuri-2026
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATA_DIR
        value: /var/data
    disk:
      name: lista-yuri-dados
      mountPath: /var/data
      sizeGB: 1
